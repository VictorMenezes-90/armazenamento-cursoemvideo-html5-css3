<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tags HTML</title>
        <link rel="icon" type="image/x-icon" href="../multimidia/favicons/d01-favicon.ico">
    </head>
    <body style="margin: 0; padding: 0;">
        <!-- Indicador Padrão -->
        <div style="display: flex; margin: 0; padding: 0; width: 100%; height: fit-content; background-color:rgb(0, 0, 255); align-items: center; justify-content: center; gap: 1.5vw;">
                <a href="" style="margin: 0; padding: 0; margin: 0; font-size: 1.25rem; font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif; color: white; text-align: center; align-self: center; text-decoration: none;">Módulo 01 | Desafio 06</a>
        </div>
        
        <div style="margin-left: 10px; margin-right: 10px;">
            <h1>Tags em HTML</h1>
            <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá ser utilizada em cada caso:</p>
            <ul type="disc">
                <li><abbr title="Utilizamos a tag &lt;p&gt; com fechamento &lt;/p&gt;, o conteúdo vai entre essas tags">Parágrafos</abbr>
                <li><abbr title="Utilizamos a tag &lt;hx&gt; com fechamento &lt;/hx&gt; onde x vai de 1 à 6 sendo 1 o mais importante.">Títulos</abbr>
                <li><abbr title="Utilizamos a tag &lt;img&gt; com fechamento &lt;/img&gt; e alguns atributos com scr (Fonte) e Alt (Texto alternativo)">Imagens</abbr>
                <li><abbr title="Utilizamos a tag &lt;code&gt; com fechamento &lt;/code&gt; e podemos usar &lt;pre&gt; e &lt;/pre&gt; para manter a formatação">Códigos-Fonte</abbr>
                <li><abbr title="Utilizamos a tag &lt;ol&gt; com fechamento &lt;/ol&gt; com atributo type=1 para criar listas numeradas, sendo &lt;li&gt; usado para cada item da lista &rarr; fechamento com &lt;/li&gt; não é obrigatório">Listas numeradas</abbr>
                <li><abbr title="Utilizamos a tag &lt;ul&gt; com fechamento &lt;/ul&gt; com atributo type=disc, circle ou square para criar listas com marcadores, &lt;li&gt; também é usado aqui para cada item da lista">Listas com marcadores</abbr>
            </ul>
        </div>
   </body>
</html>
