<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Imagem Flexível</title>
        <link rel="icon" type="image/x-icon" href="../multimidia/favicons/d01-favicon.ico">

    <body style="margin: 0; padding: 0;">
        <!-- Indicador Padrão -->
        <div style="display: flex; margin: 0; padding: 0; width: 100%; height: fit-content; background-color:rgb(0, 0, 255); align-items: center; justify-content: center; gap: 1.5vw;">
                <a href="" style="margin: 0; padding: 0; margin: 0; font-size: 1.25rem; font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif; color: white; text-align: center; align-self: center; text-decoration: none;">Módulo 01 | Desafio 07</a>

        <div style="margin-left: 10px; margin-right: 10px;">

            <picture>
                <source  media="(max-width: 740px)" srcset="../multimidia/imagens/d07-paisagem-p.png" type="image/png">
